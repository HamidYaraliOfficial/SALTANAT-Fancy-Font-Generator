  let out = "";
  for(let ch of str) {
    if(map[ch]) out += map[ch];
    else if(map[ch.toLowerCase()]) out += map[ch.toLowerCase()];
    else out += ch;
  }
  return out;
}

const normalChars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890";

function changeStyle(text, styleObj) {
  let result = "";
  for(let i = 0; i < text.length; i++) {
    let ch = text.charAt(i);
    let idx = normalChars.indexOf(ch) + 1;
    if(ch === " ") result += " ";
    else if(idx && styleObj[idx]) result += styleObj[idx];
    else result += ch;
  }
  return result;
}

function strikeThrough(t) { return t.split('').join('̶') + '̶'; }
function tildeStrike(t) { return t.split('').join('̴') + '̴'; }
function slashThrough(t) { return t.split('').join('̷') + '̷'; }
function arrowUnder(t) { return t.split('').join('͎') + '͎'; }
function doubleUnder(t) { return t.split('').join('̲') + '̲'; }
function crossTopBottom(t) { return t.split('').join('͓̽') + '͓̽'; }
function mirrorRev(t) {
  let m = {a:"ɒ",b:"d",c:"ɔ",e:"ɘ",g:"ǫ",h:"ʜ",j:"ꞁ",k:"ʞ",p:"q",s:"ꙅ",t:"ƚ",y:"ʏ",z:"ƹ",A:"ᙠ",C:"Ɔ",D:"ᗡ",E:"Ǝ",F:"ꟻ",G:"Ꭾ",J:"Ⴑ",K:"⋊",L:"⅃",P:"ꟼ",R:"Я",S:"Ꙅ",Z:"Ƹ"};
  return t.split('').reverse().map(ch => m[ch] || ch).join('');
}
function flipText(t) {
  let f = {a:"ɐ",b:"q",c:"ɔ",d:"p",e:"ǝ",f:"ɟ",g:"ɓ",h:"ɥ",i:"ı",j:"ɾ",k:"ʞ",l:"l",m:"ɯ",n:"u",r:"ɹ",t:"ʇ",v:"ʌ",w:"ʍ",y:"ʎ",A:"∀",B:"ᙠ",C:"Ɔ",D:"ᗡ",E:"Ǝ",F:"Ⅎ",G:"⅁",J:"ſ",K:"⋊",L:"˥",M:"W",P:"Ԁ",Q:"Ό",R:"ᴚ",T:"⊥",U:"∩",V:"Λ",Y:"⅄"};
  return t.split('').reverse().map(ch => f[ch] || ch).join('');
}
function luniBubbles(t) { return applyCharMap(bubblesMap, t); }

// ==================== رندر استایل‌ها | Render Styles | 渲染样式 ====================
function renderAllStyles(rawText, lang) {
  const container = document.getElementById('fontsGridContainer');
  if(!container) return;
  let text = rawText.trim();
  if(text === "") text = lang === 'fa' ? "فونت‌های فانتزی" : 
                           lang === 'en' ? "Fancy Fonts" : "花式字体";
  
  const t = TRANSLATIONS[lang] || TRANSLATIONS.fa;
  container.innerHTML = '';
  for(let style of allStyles) {
    let converted = "";
    try { converted = style.fn(text); } catch(e){ converted = text; }
    const card = document.createElement('div');
    card.className = 'font-card';
    card.setAttribute('data-copy', converted);
    card.innerHTML = `<div class="font-header"><span class="font-name">${style.name.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;})}</span><span class="copy-icon"><i class="fas fa-copy"></i> ${t.copy}</span></div><div class="font-preview">${converted.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;})}</div>`;
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      const copyVal = card.getAttribute('data-copy');
      if(copyVal) {
        copyToClip(copyVal, lang);
      }
    });
    container.appendChild(card);
  }
}

function copyToClip(txt, lang) {
  const ta = document.createElement('textarea');
  ta.value = txt;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  const toast = document.getElementById('toastCopyMsg');
  const t = TRANSLATIONS[lang] || TRANSLATIONS.fa;
  document.getElementById('toastText').textContent = t.copied || t.copySuccess || "✅ کپی شد!";
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1400);
}

// ==================== رویدادها | Events | 事件 ====================
document.addEventListener('DOMContentLoaded', () => {
  // بارگذاری زبان ذخیره شده | Load saved language | 加载保存的语言
  let savedLang = 'fa';
  try {
    const stored = localStorage.getItem('fontGeneratorLang');
    if (stored && TRANSLATIONS[stored]) savedLang = stored;
  } catch(e) {}
  
  const inputField = document.getElementById('mainText');
  const clearBtn = document.getElementById('clearInputBtn');
  
  // دکمه‌های زبان | Language buttons | 语言按钮
  document.getElementById('langFa').addEventListener('click', () => setLanguage('fa'));
  document.getElementById('langEn').addEventListener('click', () => setLanguage('en'));
  document.getElementById('langZh').addEventListener('click', () => setLanguage('zh'));
  
  // اعمال زبان | Apply language | 应用语言
  setLanguage(savedLang);
  
  const update = () => renderAllStyles(inputField.value, currentLang);
  inputField.addEventListener('input', update);
  clearBtn.addEventListener('click', () => { 
    inputField.value = ''; 
    renderAllStyles('', currentLang); 
    inputField.focus(); 
  });
  
  // مقدار اولیه | Initial value | 初始值
  renderAllStyles('SALTANAT', currentLang);
  
  // اسکرول | Scroll | 滚动
  const scrollBtn = document.getElementById('scrollTop');
  window.addEventListener('scroll', () => { 
    if(window.scrollY>200) scrollBtn.classList.add('visible'); 
    else scrollBtn.classList.remove('visible'); 
  });
  scrollBtn.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
});
